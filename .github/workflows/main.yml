name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Create database backup
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="supabase_backup_${TIMESTAMP}.sql"
          
          PGPASSWORD="$SUPABASE_PASSWORD" \
          pg_dump \
            --disable-triggers \
            --column-inserts \
            --encoding=UTF8 \
            --host="$SUPABASE_HOST" \
            --port="5432" \
            --username="$SUPABASE_USER" \
            --dbname="postgres" \
            > "$FILENAME"
          
          gzip "$FILENAME"
          
          # Create backups folder and move file
          mkdir -p backups
          mv "${FILENAME}.gz" backups/
      
      - name: Upload to GitHub using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add and commit
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated backup $(date +%Y-%m-%d)"
            # GitHub CLI handles authentication automatically with GH_TOKEN
            gh repo sync
          fi
