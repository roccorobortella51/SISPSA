name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Create database backup
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="supabase_backup_${TIMESTAMP}.sql"
          
          echo "Creating backup: $FILENAME"
          
          PGPASSWORD="$SUPABASE_PASSWORD" \
          pg_dump \
            --disable-triggers \
            --column-inserts \
            --encoding=UTF8 \
            --host="$SUPABASE_HOST" \
            --port="5432" \
            --username="$SUPABASE_USER" \
            --dbname="postgres" \
            > "$FILENAME"
          
          gzip "$FILENAME"
          echo "Backup created: ${FILENAME}.gz"
      
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backups
          path: "*.sql.gz"
          retention-days: 30
          if-no-files-found: error
      
      - name: Commit and push backup with token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Remove the default origin that uses github-actions[bot]
          echo "Removing default origin..."
          git remote remove origin
          
          # Add new origin with your token
          echo "Adding origin with token..."
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          
          # Verify the new remote
          echo "Current remote:"
          git remote -v
          
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create backups folder and move file
          mkdir -p backups
          mv *.sql.gz backups/
          
          # Commit
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated backup $(date +%Y-%m-%d)"
            
            # Push to main branch
            echo "Pushing to repository..."
            git push origin main
          fi
          
          # Clean up token from remote (optional)
          echo "Cleaning up..."
          git remote remove origin
          git remote add origin https://github.com/${GITHUB_REPOSITORY}.git
